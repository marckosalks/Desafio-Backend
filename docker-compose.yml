version: "4.3"

services:
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: cepdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: wiremock-mock
    ports:
      - "3001:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: ["--verbose", "--global-response-templating"]

  app:
    build: .
    container_name: cep-api
    ports:
      - "8080:8080"
    environment:
      - AGENCIA_URL=http://wiremock:8080
    depends_on:
      - db
      - wiremock
